<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ST-SPACE Game Rooms</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">ST-SPACE</p>
        <h1>自作ゲーム部屋</h1>
        <p class="intro">
          ひとつのURLで、いろいろな自作ゲームを選んで遊べるようにしていく土台です。
          まずは「落とし穴陣取りゲーム」を遊べます。
        </p>
      </div>

      <div class="lobby-card">
        <div class="field">
          <label for="nameInput">名前</label>
          <input id="nameInput" maxlength="24" placeholder="プレイヤー名">
        </div>

        <div class="field">
          <label>ゲームを選ぶ</label>
          <div id="gameSelect" class="game-select"></div>
        </div>

        <div class="actions">
          <button id="createRoomButton" class="primary">このゲームでルームを作る</button>
        </div>

        <div class="join-row">
          <input id="roomCodeInput" maxlength="6" placeholder="ルームID">
          <button id="joinRoomButton">参加する</button>
        </div>

        <p id="lobbyStatus" class="status-line">遊びたいゲームを選んでからルームを作るか、友達のルームIDで参加してください。</p>
      </div>
    </section>

    <section id="gameSection" class="game hidden">
      <div class="game-topbar">
        <div>
          <p class="eyebrow">現在のゲーム</p>
          <h2 id="gameTitleLabel">-</h2>
          <p id="roomCodeLabel" class="room-line">------</p>
        </div>
        <div class="topbar-actions">
          <button id="copyRoomButton">ルームIDをコピー</button>
          <button id="leaveRoomButton">ルームを出る</button>
        </div>
      </div>

      <div class="arena">
        <div class="board-wrap">
          <div id="board" class="board"></div>
          <p id="modeBanner" class="mode-banner">通常移動モード</p>

          <div class="touch-panel">
            <p class="touch-title">タップ操作</p>
            <div class="dpad" aria-label="移動ボタン">
              <button id="dirUpButton" class="dir-button" type="button" aria-label="上へ">↑</button>
              <button id="dirLeftButton" class="dir-button" type="button" aria-label="左へ">←</button>
              <button id="dirDownButton" class="dir-button" type="button" aria-label="下へ">↓</button>
              <button id="dirRightButton" class="dir-button" type="button" aria-label="右へ">→</button>
            </div>
            <p class="microcopy">移動モードなら1マス移動、ジャンプモードなら2マスジャンプします。</p>
          </div>
        </div>

        <aside class="side-panel">
          <div class="panel-block">
            <p class="eyebrow">あなた</p>
            <h3 id="youAre">-</h3>
          </div>

          <div class="panel-block">
            <p class="eyebrow">ゲーム状況</p>
            <p id="turnLabel" class="big-line">待機中...</p>
            <p id="messageLabel" class="message-box">ルームに接続するとここに状況が表示されます。</p>
            <p id="winnerLabel" class="winner-line"></p>
          </div>

          <div class="panel-block">
            <p class="eyebrow">行動</p>
            <div class="action-grid">
              <button id="moveModeButton" class="primary">移動</button>
              <button id="jumpModeButton">ジャンプ</button>
              <button id="pitModeButton">落とし穴</button>
              <button id="passButton" class="danger">行動終了</button>
            </div>
            <p class="microcopy">PCは矢印キー、スマホやタブレットは画面内の方向ボタンで操作できます。</p>
          </div>

          <div class="panel-block">
            <p class="eyebrow">プレイヤー情報</p>
            <div id="playersPanel" class="players-panel"></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
